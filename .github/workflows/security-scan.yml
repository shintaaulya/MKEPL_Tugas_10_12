name: Java Gradle Security Scan w/ Snyk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository GitHub kamu
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java ke versi 23 (sesuai build.gradle kamu)
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      # 3. Instal Snyk CLI secara manual via NPM (Bypass Snyk Actions yang error)
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 4. Berikan izin eksekusi gradlew (jaga-jaga)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Jalankan autentikasi dan langsung scan project tanpa perantara
      - name: Run Snyk Test
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}